        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/compose/projects/{project_id}/directives/resolve:
    post:
      tags: [Compose]
      summary: Resolve a directive conflict
      operationId: resolveDirective
      parameters:
        - $ref: "#/components/parameters/composeProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conflict_id, action]
              properties:
                conflict_id:
                  type: string
                action:
                  type: string
                  enum: [supersede, scope, keep_both]
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/compose/projects/{project_id}/sections/{section_id}/changing:
    put:
      tags: [Compose]
      summary: Set or clear the changing flag on a section
      operationId: updateChanging
      parameters:
        - $ref: "#/components/parameters/composeProjectId"
        - $ref: "#/components/parameters/sectionId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                changing:
                  type: boolean
                change_note:
                  type: string
                set_by:
                  type: string
                cleared_by:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "403":
          description: Cannot clear changing flag (not the setter)

  /api/compose/projects/{project_id}/sections/{section_id}/tags:
    post:
      tags: [Compose]
      summary: Add a tag to a section
      operationId: addSectionTag
      parameters:
        - $ref: "#/components/parameters/composeProjectId"
        - $ref: "#/components/parameters/sectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag]
              properties:
                tag:
                  type: string
      responses:
        "200":
          description: Tag added
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  tags:
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/compose/projects/{project_id}/sections/{section_id}/tags/{tag}:
    delete:
      tags: [Compose]
      summary: Remove a tag from a section
      operationId: removeSectionTag
      parameters:
        - $ref: "#/components/parameters/composeProjectId"
        - $ref: "#/components/parameters/sectionId"
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tag removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  tags:
                    type: array
                    items:
                      type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/compose/projects/{project_id}/planner/accept:
    post:
      tags: [Compose]
      summary: Accept an AI-proposed content plan and create sections
      operationId: acceptComposePlan
      parameters:
        - $ref: "#/components/parameters/composeProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sections]
              properties:
                sections:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      artifact_type:
                        type: string
                      brief:
                        type: string
                      subsections:
                        type: array
                        items:
                          type: object
                parent_id:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Plan accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  created_count:
                    type: integer
                  sections:
                    type: array
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/compose/projects/{project_id}/launch-all:
    post:
      tags: [Compose]
      summary: Bulk launch all unlinked section agents with initial prompts
      operationId: launchAllSections
      parameters:
        - $ref: "#/components/parameters/composeProjectId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                orchestrate_only:
                  type: boolean
                  default: false
                  description: If true, only send coordination message to root orchestrator without launching section agents
      responses:
        "200":
          description: Launch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  launched:
                    type: array
                    items:
                      type: object
                      properties:
                        section_id:
                          type: string
                        session_id:
                          type: string
                  failed:
                    type: integer
        "404":
          $ref: "#/components/responses/NotFound"

  /api/compose/projects/{project_id}/direct-all:
    post:
      tags: [Compose]
      summary: Fan-out a directive to all sections via the root orchestrator
      operationId: directAllSections
      parameters:
        - $ref: "#/components/parameters/composeProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: The directive text to send to all sections
      responses:
        "200":
          description: Directive delivered
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  directive_id:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Failed to deliver directive to root orchestrator

  # ==========================================================================
  # Analysis (analysis_api.py)
  # ==========================================================================
  /api/summary/{session_id}:
    get:
      tags: [Analysis]
      summary: Generate an HTML summary of a session
      operationId: getSessionSummary
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: HTML summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  html:
                    type: string
              example:
                html: "<div class=\"sum-topic\">Authentication Module Refactor</div><div class=\"sum-stats\">18 messages &nbsp;&middot;&nbsp; 24.5 KB &nbsp;&middot;&nbsp; Last active: 2 hours ago</div><div class=\"sum-section\"><div class=\"sum-label\">Key topics covered</div><ul><li><strong>JWT tokens:</strong> Replace session cookies with JWT-based authentication</li><li><strong>Middleware:</strong> Add token validation middleware to all protected routes</li></ul></div>"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/extract-code/{session_id}:
    get:
      tags: [Analysis]
      summary: Extract code blocks from a session
      operationId: extractCode
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Extracted code blocks
          content:
            application/json:
              schema:
                type: object
                properties:
                  blocks:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
                  languages:
                    type: array
                    items:
                      type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/export-project/{session_id}:
    get:
      tags: [Analysis]
      summary: Export code blocks as a zip file
      operationId: exportProject
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Zip file download
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  /api/compare/{id1}/{id2}:
    get:
      tags: [Analysis]
      summary: Compare code blocks between two sessions
      operationId: compareSessions
      parameters:
        - name: id1
          in: path
          required: true
          schema:
            type: string
        - name: id2
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                type: object
                properties:
                  session1:
                    type: object
                  session2:
                    type: object
                  code_diff:
                    type: array
                    items:
                      type: object
                  stats:
                    type: object
                    properties:
                      s1_blocks:
                        type: integer
                      s2_blocks:
                        type: integer
                      added:
                        type: integer
                      removed:
                        type: integer
                      changed:
                        type: integer
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================================
  # Git (git_api.py)
  # ==========================================================================
  /api/git-status:
    get:
      tags: [Git]
      summary: Get cached git status for the VibeNode repository
      operationId: getGitStatus
      responses:
        "200":
          description: Git status
          content:
            application/json:
              schema:
                type: object
              example:
                has_git: true
                ahead: 2
                behind: 0
                uncommitted: true
                ready: true

  /api/git-sync:
    post:
      tags: [Git]
      summary: Git sync (pull, push, or both)
      operationId: gitSync
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [pull, push, both]
                  default: both
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  git_status:
                    type: object

  /api/git-scan:
    get:
      tags: [Git]
      summary: Run deterministic security scan on uncommitted files
      operationId: gitScan
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                type: object

  /api/git-scan-stream:
    get:
      tags: [Git]
      summary: SSE endpoint — stream real-time file-by-file scan progress
      operationId: gitScanStream
      description: |
        Returns a Server-Sent Events stream. Each event is a JSON line with
        scan progress data. The stream ends with a final summary event.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/project-git-status:
    get:
      tags: [Git]
      summary: Get git status for the active project directory
      operationId: getProjectGitStatus
      responses:
        "200":
          description: Project git status
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_git:
                    type: boolean
                  branch:
                    type: string
                  dirty_count:
                    type: integer
                  recent_commits:
                    type: array
                    items:
                      type: object
                      properties:
                        hash:
                          type: string
                        message:
                          type: string
                  project_path:
                    type: string

  # ==========================================================================
  # Auth (auth_api.py)
  # ==========================================================================
  /api/auth-status:
    get:
      tags: [Auth]
      summary: Get Claude Code authentication status
      operationId: getAuthStatus
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                type: object
                properties:
                  loggedIn:
                    type: boolean
                  error:
                    type: string

  /api/auth-login:
    post:
      tags: [Auth]
      summary: Launch Claude Code auth login in a visible terminal
      operationId: authLogin
      responses:
        "200":
          description: Login launched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "500":
          $ref: "#/components/responses/ServerError"

  # ==========================================================================
  # Tests (test_api.py)
  # ==========================================================================
  /api/run-tests:
    post:
      tags: [Tests]
      summary: Run pytest and stream results via SSE
      operationId: runTests
      description: |
        Returns a Server-Sent Events stream. Each event is JSON with
        `type: "line"` for output or `type: "done"` for the final summary.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [fast, full]
                  default: fast
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/cancel-tests:
    post:
      tags: [Tests]
      summary: Cancel a running test process
      operationId: cancelTests
      responses:
        "200":
          description: Cancellation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string

  # ==========================================================================
  # API Docs (served from the app)
  # ==========================================================================
  /api/docs:
    get:
      tags: [App]
      summary: Serve the API documentation page (Redoc)
      operationId: apiDocs
      responses:
        "200":
          description: HTML documentation page
          content:
            text/html:
              schema:
                type: string

  /api/invoke/discover:
    get:
      tags: [Invoke]
      summary: Discover local workforce skills and agents in the active project
      operationId: discoverLocalWorkforce
      parameters:
        - name: depth
          in: query
          schema:
            type: integer
            default: 3
          description: Child scan depth
        - name: find_depth
          in: query
          schema:
            type: integer
            default: 4
          description: Folder find depth
      responses:
        "200":
          description: Discovered local skills and agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  local_skills:
                    type: array
                    items:
                      type: object
                  local_agents:
                    type: array
                    items:
                      type: object

components:
  parameters:
    sessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
      description: Session UUID
    taskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
      description: Task UUID
    composeProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
      description: Compose project UUID
    sectionId:
      name: section_id
      in: path
      required: true
      schema:
        type: string
      description: Compose section UUID
    projectIdQuery:
      name: project_id
      in: query
      schema:
        type: string
      description: Project identifier (defaults to active project)
    startDate:
      name: start_date
      in: query
      schema:
        type: string
        format: date
      description: Start date (ISO format, defaults to 30 days ago)
    endDate:
      name: end_date
      in: query
      schema:
        type: string
        format: date
      description: End date (ISO format, defaults to today)

  schemas:
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    OkMessage:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        ok:
          type: boolean
          example: false

    SessionSummary:
      type: object
      properties:
        id:
          type: string
        display_title:
          type: string
        custom_title:
          type: string
        user_named:
          type: boolean
        date:
          type: string
        last_activity:
          type: string
        last_activity_ts:
          type: number
        sort_ts:
          type: number
        size:
          type: string
        file_bytes:
          type: integer
        message_count:
          type: integer
        preview:
          type: string

    SessionDetail:
      type: object
      properties:
        id:
          type: string
        display_title:
          type: string
        custom_title:
          type: string
        date:
          type: string
        size:
          type: string
        message_count:
          type: integer
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
              type:
                type: string
        preview:
          type: string

    Project:
      type: object
      properties:
        encoded:
          type: string
        display:
          type: string
        custom_name:
          type: string
        session_count:
          type: integer
        active:
          type: boolean

    LogEntry:
      type: object
      properties:
        kind:
          type: string
          enum: [user, asst, tool_use, tool_result, system]
        text:
          type: string
        id:
          type: string
        name:
          type: string
        desc:
          type: string
        tool_use_id:
          type: string
        is_error:
          type: boolean

    KanbanTask:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        parent_id:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
        verification_url:
          type: string
          nullable: true
        status:
          type: string
          enum: [not_started, working, validating, remediating, complete]
        position:
          type: integer
        depth:
          type: integer
        owner:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
        children_count:
          type: integer
        children_complete:
          type: integer
        session_count:
          type: integer
        active_sessions:
          type: integer
        tags:
          type: array
          items:
            type: string

    KanbanIssue:
      type: object
      properties:
        id:
          type: string
        task_id:
          type: string
        description:
          type: string
        created_at:
          type: string
        resolved_at:
          type: string
          nullable: true

    KanbanConfig:
      type: object
      properties:
        backend:
          type: string
          enum: [sqlite, supabase]
        kanban_backend:
          type: string
        supabase_url:
          type: string
        supabase_connected:
          type: boolean
        depth_limit:
          type: integer
        auto_advance:
          type: boolean
        kanban_auto_advance:
          type: boolean
        kanban_page_size:
          type: integer
        validation_url_enabled:
          type: boolean
        validation_base_url:
          type: string
        validation_url_dismissed:
          type: boolean
        file_tracking_enabled:
          type: boolean

    WorkforceAsset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        department:
          type: string
        tags:
          type: array
          items:
            type: string
        active:
          type: boolean
        version:
          type: string
          nullable: true
        allowed_tools:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        systemPrompt:
          type: string

  responses:
    BadRequest:
      description: Bad request — missing or invalid parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
