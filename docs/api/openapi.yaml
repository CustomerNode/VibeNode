  /api/kanban/board:
    get:
      tags: [Kanban]
      summary: Get full board state with columns, tasks, and tags
      operationId: getKanbanBoard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tag filter
        - name: parent_id
          in: query
          schema:
            type: string
          description: Scope to a parent task's children
      responses:
        "200":
          description: Board data
          content:
            application/json:
              schema:
                type: object
                properties:
                  columns:
                    type: array
                    items:
                      type: object
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/KanbanTask"
                  tags:
                    type: array
                    items:
                      type: string
                  active_tag_filter:
                    type: array
                    items:
                      type: string
              example:
                columns:
                  - status_key: "not_started"
                    label: "Not Started"
                    color: "#6b7280"
                    total_count: 2
                    page: 1
                    has_more: false
                  - status_key: "working"
                    label: "Working"
                    color: "#3b82f6"
                    total_count: 1
                    page: 1
                    has_more: false
                  - status_key: "complete"
                    label: "Complete"
                    color: "#22c55e"
                    total_count: 1
                    page: 1
                    has_more: false
                tasks:
                  - id: "task_xyz789"
                    project_id: "C-Users-dev-Documents-my-project"
                    parent_id: null
                    title: "Implement user login page"
                    description: ""
                    status: "not_started"
                    position: 1000
                    depth: 0
                    children_count: 2
                    children_complete: 0
                    session_count: 0
                    active_sessions: 0
                  - id: "task_abc456"
                    project_id: "C-Users-dev-Documents-my-project"
                    parent_id: null
                    title: "Set up CI pipeline"
                    description: "Configure GitHub Actions"
                    status: "working"
                    position: 1000
                    depth: 0
                    children_count: 0
