openapi: 3.1.0
info:
  title: VibeNode API
  version: 1.0.0
  description: |
    VibeNode is a GUI application for managing Claude Code sessions, projects,
    kanban boards, composition workflows, and more. This spec documents all
    REST endpoints served by the Flask web server on port 5050.

    **Base URL:** `http://localhost:5050`

    **Authentication:** None. VibeNode is a localhost-only development tool.
    All endpoints are available without credentials.

    VibeNode also uses SocketIO for real-time push events. Those are documented
    separately in `socketio-events.md`.

    ---

    ## Getting Started

    The typical workflow for driving VibeNode programmatically:

    ### 1. List projects

    ```http
    GET /api/projects
    ```

    Returns an array of project objects. Each has `encoded` (the internal key),
    `display` (the filesystem path), `custom_name`, `session_count`, and
    `active` (boolean).

    ### 2. Switch to a project

    ```http
    POST /api/set-project
    Content-Type: application/json

    { "project": "my-project" }
    ```

    Pass the `encoded` value from step 1. Returns `{ "ok": true, "project": "...", "display": "..." }`.

    ### 3. Start a session (SocketIO)

    Connect to `ws://localhost:5050` with Socket.IO, then emit:

    ```json
    {
      "session_id": "session_abc123",
      "cwd": "/path/to/project",
      "prompt": "Refactor the auth module",
      "name": "Auth refactor"
    }
    ```

    The server confirms with a `session_started` event: `{ "session_id": "session_abc123" }`.

    ### 4. Send a follow-up message (SocketIO)

    Once the session is idle, emit `send_message`:

    ```json
    { "session_id": "session_abc123", "text": "Now add unit tests" }
    ```

    The server replies with `message_ack`: `{ "session_id": "session_abc123" }`.

    ### 5. Watch for responses (SocketIO)

    Listen for `session_entry` events — the server pushes each new entry as it
    arrives:

    ```json
    {
      "session_id": "session_abc123",
      "entry": { "kind": "asst", "text": "Here is the refactored module..." }
    }
    ```

    Entry `kind` values: `user`, `asst`, `tool_use`, `tool_result`, `system`.

    ### 6. List sessions

    ```http
    GET /api/sessions?project=my-project
    ```

    Returns an array of session summary objects, each with `id`, `display_title`,
    `date`, `last_activity`, `message_count`, and `preview`.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5050
    description: Local development server

tags:
  - name: App
    description: Application shell, restart, shutdown
  - name: Sessions
    description: Session CRUD — list, view, rename, delete, duplicate, fork, rewind
  - name: Projects
    description: Project management — list, switch, add, find, chat, new session
  - name: Live
    description: Live session state, log streaming, hooks, CLAUDE.md, config, file ops
  - name: Models
    description: Available Claude models
  - name: Workforce
    description: Agent/skill asset management, discovery, install
  - name: Kanban
    description: Kanban board — task CRUD, status transitions, session linking, columns
  - name: Kanban Planner
    description: AI-powered task planning and decomposition
  - name: Kanban Config
    description: Kanban configuration and backend migration
  - name: Kanban Backups
    description: Kanban data backup and restore
  - name: Kanban Reports
    description: Kanban analytics — velocity, cycle time, distribution, etc.
  - name: Compose
    description: Composition projects, sections, export, directives, conflict resolution
  - name: Analysis
    description: Session summary, code extraction, export, compare
  - name: Git
    description: Git status, sync, security scanning
  - name: Auth
    description: Claude Code authentication status and login
  - name: Tests
    description: Test runner (SSE stream) and cancellation

paths:
  # ==========================================================================
  # App (main.py)
  # ==========================================================================
  /:
    get:
      tags: [App]
      summary: Serve the single-page application
      operationId: index
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /api/restart:
    post:
      tags: [App]
      summary: Restart the web server, daemon, or both
      operationId: restartServer
      description: |
        **WARNING:** Restarting the daemon (`scope: "daemon"` or `"both"`) will
        terminate ALL active Claude sessions and agents across the entire
        application. Use `scope: "web"` (the default) for safe restarts.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  type: string
                  enum: [web, daemon, both]
                  default: web
                  description: Which component to restart
      responses:
        "200":
          description: Restart initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkMessage"
              example:
                ok: true
                message: "Restarting (web)..."
        "500":
          $ref: "#/components/responses/ServerError"

  /api/shutdown:
    post:
      tags: [App]
      summary: Shut down both web server and daemon
      operationId: shutdownServer
      description: |
        Sends acknowledgement first, then kills ports 5050 and 5051 after a
        short delay so the client receives the response.
      responses:
        "200":
          description: Shutdown initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkMessage"
              example:
                ok: true
                message: "Server shutting down..."
        "500":
          $ref: "#/components/responses/ServerError"

  # ==========================================================================
  # Sessions (sessions_api.py)
  # ==========================================================================
  /api/sessions:
    get:
      tags: [Sessions]
      summary: List all sessions for a project
      operationId: listSessions
      parameters:
        - name: project
          in: query
          schema:
            type: string
          description: Encoded project identifier. Defaults to active project.
      responses:
        "200":
          description: Array of session summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionSummary"
              example:
                - id: "session_abc123"
                  display_title: "Refactor authentication module"
                  custom_title: "Refactor authentication module"
                  user_named: true
                  date: "Apr 12, 2026"
                  last_activity: "2 hours ago"
                  last_activity_ts: 1744444800
                  sort_ts: 1744444800
                  size: "24.5 KB"
                  file_bytes: 25088
                  message_count: 18
                  preview: "Can you help me refactor the auth module to use JWT tokens?"
                - id: "session_def456"
                  display_title: "New Session"
                  custom_title: ""
                  user_named: false
                  date: ""
                  last_activity: ""
                  last_activity_ts: 0
                  sort_ts: 0
                  size: ""
                  file_bytes: 0
                  message_count: 0
                  preview: ""

  /api/resolve-session/{session_id}:
    get:
      tags: [Sessions]
      summary: Resolve a session ID through SDK aliases
      operationId: resolveSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resolved session ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  remapped:
                    type: boolean

  /api/session/{session_id}:
    get:
      tags: [Sessions]
      summary: Get full session data
      operationId: getSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: meta_only
          in: query
          schema:
            type: string
            enum: ["0", "1"]
          description: If "1", return only metadata (id, title)
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Session data (full or meta-only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
              example:
                id: "session_abc123"
                display_title: "Refactor authentication module"
                custom_title: "Refactor authentication module"
                date: "Apr 12, 2026"
                size: "24.5 KB"
                message_count: 3
                messages:
                  - role: "user"
                    content: "Can you help me refactor the auth module?"
                    type: "user"
                  - role: "assistant"
                    content: "Sure! I'll start by reviewing the current authentication flow."
                    type: "assistant"
                  - role: "user"
                    content: "Great, let's use JWT tokens instead of session cookies."
                    type: "user"
                preview: "Can you help me refactor the auth module?"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/rename/{session_id}:
    post:
      tags: [Sessions]
      summary: Rename a session
      operationId: renameSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                project:
                  type: string
      responses:
        "200":
          description: Renamed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  title:
                    type: string
              example:
                ok: true
                title: "Auth module refactor v2"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/remap-name:
    post:
      tags: [Sessions]
      summary: Re-persist a user-set name under a new session ID after SDK remaps
      operationId: remapName
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_id, new_id]
              properties:
                old_id:
                  type: string
                new_id:
                  type: string
                project:
                  type: string
      responses:
        "200":
          description: Name remapped
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  title:
                    type: string
                  skipped:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/autonname/{session_id}:
    post:
      tags: [Sessions]
      summary: Auto-generate a title for a session using AI
      operationId: autoNameSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  type: string
                prompt:
                  type: string
                  description: Direct prompt text for immediate naming
                re_evaluate:
                  type: boolean
                  description: Re-evaluate an existing auto-title
      responses:
        "200":
          description: Title generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  title:
                    type: string
                  skipped:
                    type: boolean
                  reason:
                    type: string
                  renamed:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/delete/{session_id}:
    delete:
      tags: [Sessions]
      summary: Delete a session
      operationId: deleteSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/delete-all:
    delete:
      tags: [Sessions]
      summary: Delete all sessions in the active workspace
      operationId: deleteAllSessions
      parameters:
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All sessions deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: integer

  /api/delete-empty:
    delete:
      tags: [Sessions]
      summary: Delete all empty sessions (zero messages)
      operationId: deleteEmptySessions
      parameters:
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Empty sessions deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: integer

  /api/duplicate/{session_id}:
    post:
      tags: [Sessions]
      summary: Duplicate a session
      operationId: duplicateSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Duplicated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  new_id:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/continue/{session_id}:
    post:
      tags: [Sessions]
      summary: Continue a long session by creating a new one with context handoff
      operationId: continueSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Continuation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  new_id:
                    type: string
                  title:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/session-timeline/{session_id}:
    get:
      tags: [Sessions]
      summary: Get lightweight message timeline for fork/rewind picker
      operationId: getSessionTimeline
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Timeline data
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                  has_snapshots:
                    type: boolean
                  title:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/fork/{session_id}:
    post:
      tags: [Sessions]
      summary: Fork a session at a given line number
      operationId: forkSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [up_to_line]
              properties:
                up_to_line:
                  type: integer
                  description: JSONL line number to fork up to
      responses:
        "200":
          description: Forked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  new_id:
                    type: string
                  title:
                    type: string
              example:
                ok: true
                new_id: "session_fork_ghi012"
                title: "Refactor authentication module (fork)"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/rewind/{session_id}:
    post:
      tags: [Sessions]
      summary: Rewind tracked files to state at a given message
      operationId: rewindSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [up_to_line]
              properties:
                up_to_line:
                  type: integer
      responses:
        "200":
          description: Files rewound
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  files_restored:
                    type: array
                    items:
                      type: string
                  files_skipped:
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/fork-rewind/{session_id}:
    post:
      tags: [Sessions]
      summary: Fork conversation AND rewind code to a given message
      operationId: forkRewindSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [up_to_line]
              properties:
                up_to_line:
                  type: integer
      responses:
        "200":
          description: Fork + rewind completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  new_id:
                    type: string
                  title:
                    type: string
                  files_restored:
                    type: array
                    items:
                      type: string
                  files_skipped:
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/open/{session_id}:
    post:
      tags: [Sessions]
      summary: Open/resume a session via the SDK SessionManager
      operationId: openSession
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Session opened
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  already_running:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ==========================================================================
  # Projects (project_api.py)
  # ==========================================================================
  /api/projects:
    get:
      tags: [Projects]
      summary: List all registered projects
      operationId: listProjects
      responses:
        "200":
          description: Array of project objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
              example:
                - encoded: "C-Users-dev-Documents-my-project"
                  display: "C:/Users/dev/Documents/my-project"
                  custom_name: "My Project"
                  session_count: 12
                  active: true
                - encoded: "C-Users-dev-Documents-another-app"
                  display: "C:/Users/dev/Documents/another-app"
                  custom_name: ""
                  session_count: 3
                  active: false

  /api/set-project:
    post:
      tags: [Projects]
      summary: Switch the active project
      operationId: setProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project]
              properties:
                project:
                  type: string
                  description: Encoded project identifier
      responses:
        "200":
          description: Project switched
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  project:
                    type: string
                  display:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/rename-project:
    post:
      tags: [Projects]
      summary: Set a custom display name for a project
      operationId: renameProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [encoded]
              properties:
                encoded:
                  type: string
                name:
                  type: string
                  description: Custom name (empty to clear)
      responses:
        "200":
          description: Renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/delete-project:
    post:
      tags: [Projects]
      summary: Delete a project and all its sessions
      operationId: deleteProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [encoded]
              properties:
                encoded:
                  type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/add-project:
    post:
      tags: [Projects]
      summary: Add a project via browse, path, or create new
      operationId: addProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [browse, path, create]
                  default: browse
                path:
                  type: string
                  description: Required for mode=path
                name:
                  type: string
                  description: Required for mode=create
      responses:
        "200":
          description: Project added
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  encoded:
                    type: string
                  path:
                    type: string
                  cancelled:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/find-projects:
    get:
      tags: [Projects]
      summary: Scan common directories for unregistered code projects
      operationId: findProjects
      responses:
        "200":
          description: Discovered projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        name:
                          type: string
                        encoded:
                          type: string
                        type:
                          type: string
                        indicators:
                          type: array
                          items:
                            type: string

  /api/project-chat:
    post:
      tags: [Projects]
      summary: AI-assisted project finder
      operationId: projectChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        "200":
          description: Chat response with suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                  suggestions:
                    type: array
                    items:
                      type: string
                  matches:
                    type: array
                    items:
                      type: object

  /api/new-session:
    post:
      tags: [Projects]
      summary: Launch a new Claude SDK session (or resume existing)
      operationId: newSession
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                resume_id:
                  type: string
                  description: If provided, resume this session instead of creating new
                prompt:
                  type: string
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  new_id:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  # ==========================================================================
  # Live (live_api.py)
  # ==========================================================================
  /api/_emit-permission:
    post:
      tags: [Live]
      summary: Internal — emit session_permission via SocketIO (legacy)
      operationId: internalEmitPermission
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                tool_name:
                  type: string
                tool_input:
                  type: object
      responses:
        "200":
          description: Emitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/hook/pre-tool:
    post:
      tags: [Live]
      summary: Handle PreToolUse hook callback from Claude CLI
      operationId: hookPreTool
      description: |
        Proxies the request to the session daemon, which blocks until the
        user responds via the WebSocket permission_response event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tool_name:
                  type: string
                tool_input:
                  type: object
                session_id:
                  type: string
      responses:
        "200":
          description: Permission decision
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    enum: [allow, deny]

  /api/live/state/{session_id}:
    get:
      tags: [Live]
      summary: Get lightweight session state (for watchdog polling)
      operationId: getLiveState
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
