name: E2E Tests

on:
  # Manual trigger for on-demand runs
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Specific test file (blank = all)'
        required: false
        default: ''

  # Nightly run
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily

  # On PR — only if E2E-relevant files changed
  pull_request:
    paths:
      - 'templates/**'
      - 'static/js/**'
      - 'static/css/**'
      - 'app/**'
      - 'tests/e2e/**'
      - 'run.py'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run E2E tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.test_file }}" ]; then
            pytest "tests/e2e/${{ github.event.inputs.test_file }}" \
              -m e2e -v --timeout=300 --reruns 2 \
              --html=test-report.html --self-contained-html
          else
            pytest tests/e2e \
              -m e2e -v --timeout=300 --reruns 2 \
              --html=test-report.html --self-contained-html
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: test-report.html

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/screenshots/
