[pytest]
testpaths = tests
markers =
    e2e: end-to-end tests requiring a running server and/or Selenium
    slow: tests that take more than a few seconds
    live_server: tests that require a running live server (not the test server)

# Default: run fast tests only (ignore e2e subfolder)
addopts = --ignore=tests/e2e -q --timeout=60
timeout = 60

# E2E tests: run with
#   pytest tests/e2e -m e2e -v --timeout=300 --reruns 2
